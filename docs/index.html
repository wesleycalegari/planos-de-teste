function badgeHtml(status) {
  const map = { aprovado:'badge-aprovado', reprovado:'badge-reprovado', parcial:'badge-parcial', pendente:'badge-pendente' };
  const label = { aprovado:'✅ Aprovado', reprovado:'❌ Reprovado', parcial:'⚠️ Parcial', pendente:'⏳ Pendente' };
  return `<span class="badge ${map[status]||'badge-pendente'}">${label[status]||'⏳ Pendente'}</span>`;
}

function filtrar() {
  const sprint = document.getElementById('filtro-sprint').value;
  const status = document.getElementById('filtro-status').value;
  const busca  = document.getElementById('filtro-busca').value.toLowerCase();

  const visiveis = PLANOS.filter(p =>
    (!sprint || p.sprint_slug === sprint) &&
    (!status || p.status === status) &&
    (!busca  || p.id.toLowerCase().includes(busca) ||
                p.titulo.toLowerCase().includes(busca) ||
                (p.modulo||'').toLowerCase().includes(busca))
  );
  renderCards(visiveis);
}

function resetFiltros() {
  document.getElementById('filtro-sprint').value = '';
  document.getElementById('filtro-status').value = '';
  document.getElementById('filtro-busca').value  = '';
  renderCards(PLANOS);
}

function renderCards(lista) {
  const container = document.getElementById('container');
  if (!lista.length) {
    container.innerHTML = '<div class="empty">Nenhum plano encontrado com os filtros aplicados.</div>';
    atualizarStats(lista);
    return;
  }

  // Agrupar por sprint
  const grupos = {};
  lista.forEach(p => {
    if (!grupos[p.sprint]) grupos[p.sprint] = [];
    grupos[p.sprint].push(p);
  });

  container.innerHTML = Object.entries(grupos).map(([sprint, planos]) => `
    <div class="sprint-group">
      <div class="sprint-title">${sprint}</div>
      <div class="cards">
        ${planos.map(p => `
          <div class="card">
            <div class="card-top">
              <span class="card-id">${p.id.toUpperCase()}</span>
              ${badgeHtml(p.status)}
            </div>
            <div class="card-titulo">${p.titulo}</div>
            <div class="card-meta">
              <span>🖥️ ${p.sistema||''}</span>
              ${p.modulo ? `<span>📂 ${p.modulo}</span>` : ''}
              <span>📅 ${p.data_execucao||'—'}</span>
            </div>
            <div class="ct-bar">
              ${p.cts_aprovados  ? `<span class="ct-count ct-ok">${p.cts_aprovados} aprovados</span>` : ''}
              ${p.cts_reprovados ? `<span class="ct-count ct-fail">${p.cts_reprovados} reprovados</span>` : ''}
              ${p.cts_pendentes  ? `<span class="ct-count ct-pend">${p.cts_pendentes} pendentes</span>` : ''}
            </div>
            <a class="card-btn" href="${p.url}" target="_blank">Ver plano completo →</a>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  atualizarStats(lista);
}

function atualizarStats(lista) {
  document.getElementById('stat-total').textContent     = lista.length;
  document.getElementById('stat-aprovado').textContent  = lista.filter(p=>p.status==='aprovado').length;
  document.getElementById('stat-reprovado').textContent = lista.filter(p=>p.status==='reprovado').length;
  document.getElementById('stat-parcial').textContent   = lista.filter(p=>p.status==='parcial').length;
  document.getElementById('stat-pendente').textContent  = lista.filter(p=>p.status==='pendente').length;
}

function init() {
  // Popular filtro de sprints
  const sprints = [...new Set(PLANOS.map(p=>p.sprint))];
  const sel = document.getElementById('filtro-sprint');
  sprints.forEach(s => {
    const slug = PLANOS.find(p=>p.sprint===s).sprint_slug;
    sel.innerHTML += `<option value="${slug}">${s}</option>`;
  });

  document.getElementById('ultima-atualizacao').textContent =
    PLANOS.length ? 'Atualizado em ' + PLANOS[PLANOS.length-1].data_execucao : '';

  renderCards(PLANOS);
}

init();
</script>
</body>
</html>
